# Additional community examples and optional workflows:
# https://github.com/r-lib/actions/tree/v2/examples#readme
#
# R release uses renv (setup-renv). R devel uses setup-r-dependencies from
# DESCRIPTION because lockfiles are pinned to a single R minor series; refresh
# renv.lock when you need strict reproducibility on devel as well.
on:
  push:
    branches: [dev, master, main]
  pull_request:
    branches: [dev, master, main]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check-renv:
    name: ubuntu-latest (R release + renv)
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RENV_CONFIG_PAK_ENABLED: true
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

  R-CMD-check-devel:
    name: ubuntu-latest (R devel + DESCRIPTION deps)
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: devel
          http-user-agent: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
